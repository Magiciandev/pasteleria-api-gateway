spring.application.name=pedido-service
server.port=9094

spring.datasource.url=jdbc:mysql://localhost:3306/bd_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog-master.xml

logging.level.com.example.pedido_service=DEBUG
logging.level.liquibase=DEBUG
