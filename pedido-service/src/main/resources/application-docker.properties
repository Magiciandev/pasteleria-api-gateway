# Perfil activo solo dentro de contenedores Docker.
# Sobrescribe la conexion a la base de datos para que apunte al MySQL
# del host (XAMPP) en lugar de localhost, ya que dentro de un contenedor
# "localhost" se refiere al propio contenedor, no al equipo anfitrion.
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
