server:
  port: 9090

spring:
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: esta_es_mi_compleja_clave_secreta

  cloud:
    gateway:
      routes:

        # =========================================================
        # AUTH-SERVICE (Puerto 9097)
        # =========================================================
        - id: auth-service
          uri: http://auth-service:9097
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: auth-service-api-docs
          uri: http://auth-service:9097
          predicates:
            - Path=/auth-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: auth-service-swagger-ui
          uri: http://auth-service:9097
          predicates:
            - Path=/auth-service/doc/swagger-ui/**
          filters:
            - StripPrefix=1

        # =========================================================
        # CLIENTE-SERVICE (Puerto 9091)
        # =========================================================
        - id: cliente-service
          uri: http://cliente-service:9091
          predicates:
            - Path=/clientes/**
          filters:
            - StripPrefix=0

        - id: cliente-service-api-docs
          uri: http://cliente-service:9091
          predicates:
            - Path=/cliente-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: cliente-service-swagger-ui
          uri: http://cliente-service:9091
          predicates:
            - Path=/cliente-service/doc/swagger-ui/**
          filters:
            - StripPrefix=1

        # =========================================================
        # EMPLEADO-SERVICE (Puerto 9092)
