server:
  port: 9090

spring:
  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: esta_es_mi_compleja_clave_secreta

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:9097
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: cliente-service
          uri: http://localhost:9091
          predicates:
            - Path=/clientes/**
          filters:
            - StripPrefix=0

        - id: compra-service
          uri: http://localhost:9092
          predicates:
            - Path=/compras/**
          filters:
            - StripPrefix=0

        - id: producto-service
          uri: http://localhost:9093
          predicates:
            - Path=/productos/**
          filters:
            - StripPrefix=0

        - id: pedido-service
          uri: http://localhost:9094
          predicates:
            - Path=/pedidos/**
          filters:
            - StripPrefix=0

        - id: envio-service
          uri: http://localhost:9096
          predicates:
            - Path=/envios/**
          filters:
            - StripPrefix=0
